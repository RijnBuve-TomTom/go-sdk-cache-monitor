<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cache Monitor</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header id="header">
    <div class="header-left">
      <h1>🗺️ Cache Monitor</h1>
      <span id="connection-badge" class="badge badge-disconnected">Disconnected</span>
      <span id="device-id" class="device-id"></span>
    </div>
    <div class="header-right">
      <span id="msg-counter" class="counter">0 msgs</span>
      <span id="events-per-sec" class="counter">0 evt/s</span>
      <div class="menu-wrapper">
        <button id="menu-btn" class="menu-btn" title="Menu">
          <span class="menu-icon"></span>
          <span class="menu-icon"></span>
          <span class="menu-icon"></span>
        </button>
        <div id="menu-dropdown" class="menu-dropdown hidden">
          <label id="menu-auto-zoom" class="menu-item menu-toggle">
            <input type="checkbox" id="auto-zoom-checkbox" checked />
            <span>Auto-zoom to tiles</span>
          </label>
          <button id="menu-clear-tiles" class="menu-item">Clear Tiles</button>
          <button id="menu-clear-key" class="menu-item">Clear API Key</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Top half: Map ─────────────────────────────────────────────────── -->
  <section id="map-container">
    <div id="map"></div>
    <div id="map-legend" class="map-legend">
      <span class="legend-title">Tile Events</span>
      <span class="legend-item"><span class="legend-swatch" data-event="hit"></span>Hit</span>
      <span class="legend-item"><span class="legend-swatch" data-event="miss"></span>Miss</span>
      <span class="legend-item"><span class="legend-swatch" data-event="download"></span>Download</span>
      <span class="legend-item"><span class="legend-swatch" data-event="evict"></span>Evict</span>
      <span class="legend-item"><span class="legend-swatch" data-event="expiredHit"></span>Expired</span>
      <span class="legend-item"><span class="legend-swatch" data-event="update"></span>Update</span>
      <span class="legend-item"><span class="legend-swatch" data-event="corruption"></span>Corruption</span>
      <span class="legend-item"><span class="legend-swatch" data-event="flush"></span>Flush</span>
    </div>
  </section>

  <!-- ── Bottom half: Dashboard grid ───────────────────────────────────── -->
  <main id="main">
    <!-- Left: Tile event feed -->
    <section id="tile-feed" class="panel">
      <h2>Live Tile Events</h2>
      <div id="tile-feed-list" class="feed-list"></div>
    </section>

    <!-- Center: Charts -->
    <section id="charts" class="panel">
      <h2>Event Rate <small>(last 60s)</small></h2>
      <canvas id="rate-chart" height="200"></canvas>
      <div id="timeline-slider" class="timeline-slider">
        <div class="timeline-track">
          <div class="timeline-elapsed" id="timeline-elapsed"></div>
          <div class="timeline-thumb" id="timeline-thumb" title="Drag to travel in time">
            <span class="timeline-thumb-arrow">▼</span>
          </div>
        </div>
        <div class="timeline-labels">
          <span id="timeline-label-start" class="timeline-label">-60s</span>
          <span id="timeline-label-cursor" class="timeline-label timeline-label-cursor"></span>
          <span id="timeline-label-end" class="timeline-label">now</span>
        </div>
        <button id="timeline-go-live" class="timeline-go-live hidden" title="Return to live">● LIVE</button>
      </div>
      <h2>Hit Ratio <small>(per cache)</small></h2>
      <canvas id="hit-ratio-chart" height="200"></canvas>
    </section>

    <!-- Right: Cache stats -->
    <section id="cache-stats" class="panel">
      <h2>Cache Statistics</h2>
      <div id="cache-stats-container"></div>
    </section>
  </main>

  <!-- ── Floating event log ─────────────────────────────────────────────── -->
  <div id="floating-stats" class="floating-window">
    <div class="floating-header" id="floating-header">
      <span>📊 Detailed Stats</span>
      <button id="floating-toggle" class="floating-btn">_</button>
    </div>
    <div id="floating-body" class="floating-body">
      <div id="floating-content"></div>
    </div>
  </div>

  <!-- ── Alert toast for cache events ───────────────────────────────────── -->
  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
